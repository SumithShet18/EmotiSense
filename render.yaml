services:
  - type: web
    name: emotisense-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMOTISENSE_DEMO
        value: "true"
      - key: EMOTISENSE_DEVICE
        value: cpu
