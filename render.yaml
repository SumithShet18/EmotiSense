services:
  - type: web
    name: emotisense-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EMOTISENSE_DEMO
        value: "true"
      - key: EMOTISENSE_DEVICE
        value: cpu
      - key: USE_SUPABASE
        value: "true"
      - key: SUPABASE_URL
        value: https://gbyqjrgwammzolzezzcb.supabase.co
      - key: SUPABASE_ANON_KEY
        value: sb_publishable_xAebB1ojCoDZOgUu5o2mEg_YhrM6bNp
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: audio-files
